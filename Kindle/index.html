<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Library - Din personlige læseoplevelse</title>
    <meta name="description" content="Din Kindle library med alle dine bøger, noter og highlights">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- STRATEGI-PLAN: Brugerbehov & site objectives -->
    
    <!-- SCOPE-PLAN: Features og funktionalitet -->
    
    <!-- STRUKTUR-PLAN: Interaktionsdesign & information architecture -->
    <header class="site-header" role="banner">
        <div class="logo-area">
            <a href="/" class="logo" aria-label="Kindle Library hjem">
                kindle <span>Library</span>
            </a>
        </div>
        
        <div class="search-section" role="search">
            <form class="search-form" action="/search" method="GET">
                <div class="search-container">
                    <input type="search" 
                           name="q" 
                           id="search-input"
                           placeholder="Search your Kindle" 
                           aria-label="Søg i dit bibliotek"
                           autocomplete="off">
                    <button type="submit" class="search-btn" aria-label="Søg">
                        <span class="search-icon">🔍</span>
                    </button>
                </div>
            </form>
            
            <div class="filter-controls" role="group" aria-label="Filtrer og sorter">
                <button class="filter-btn" aria-expanded="false">Filter</button>
                <span class="separator" aria-hidden="true">|</span>
                <div class="sort-group">
                    <span id="sort-label">Sort by:</span>
                    <button class="sort-btn" aria-haspopup="true" aria-labelledby="sort-label">
                        Recent <span class="dropdown-icon" aria-hidden="true">▼</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- STRUKTUR-PLAN: Hierarkisk navigation -->
    <div class="content-wrapper">
        <nav class="primary-nav" role="navigation" aria-label="Hovednavigation">
            <ul class="nav-list" role="list">
                <li class="nav-item" role="listitem">
                    <a href="/library" class="nav-link active" aria-current="page">Library</a>
                </li>
                <li class="nav-item" role="listitem">
                    <a href="/books" class="nav-link">Books</a>
                </li>
                <li class="nav-item" role="listitem">
                    <a href="/comics" class="nav-link">Comics</a>
                </li>
                <li class="nav-item" role="listitem">
                    <a href="/samples" class="nav-link">Samples</a>
                </li>
                <li class="nav-item" role="listitem">
                    <a href="/notes" class="nav-link">Notes & Highlights</a>
                </li>
            </ul>
        </nav>

        <!-- SKELETON-PLAN: Layout og grid-struktur -->
        <main class="library-content" role="main" aria-label="Dine bøger">
            <!-- OVERFLADE-PLAN: Bog-grid bliver dynamisk genereret -->
            <div class="books-grid" id="books-grid" role="grid" aria-label="Bogsamling">
                <!-- Bøger bliver indsat her via JavaScript -->
            </div>
        </main>
    </div>

    <!-- JavaScript til at loope gennem billeder og generere book-cards -->
    <script src="script.js"></script>
</body>
</html>
